<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>動き検知テスト</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, sans-serif;
    background: #0f1117; color: #e8eaf0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; padding: 20px;
    transition: background 0.15s;
  }
  body.over { background: #5c1a1a; }
  #start { font-size: 22px; padding: 18px 36px; border: none; border-radius: 14px;
    background: #4f7cff; color: #fff; font-weight: 700; }
  #version { font-size: 13px; color: #6b7180; font-variant-numeric: tabular-nums; }
  .hidden { display: none !important; }
  .penalty { font-size: 88px; font-weight: 800; line-height: 1; }
  .penalty small { font-size: 18px; font-weight: 500; color: #9aa0b0; display: block; margin-top: 6px; }
  .row { font-size: 15px; color: #9aa0b0; font-variant-numeric: tabular-nums; }
  .row b { color: #e8eaf0; font-size: 19px; }
  #bar { width: 80%; height: 22px; background: #232838; border-radius: 11px; overflow: hidden; }
  #barfill { height: 100%; width: 0%; background: #4f7cff; }
  input[type=range] { width: 100%; }
  .panel { width: 88%; max-width: 420px; display: flex; flex-direction: column; gap: 14px;
    background: #161a26; border: 1px solid #232838; border-radius: 14px; padding: 16px; }
  .ctl { display: flex; flex-direction: column; gap: 5px; }
  .ctl-head { display: flex; justify-content: space-between; font-size: 14px; color: #9aa0b0; }
  .ctl-head b { color: #e8eaf0; font-size: 16px; font-variant-numeric: tabular-nums; }
  .hint { font-size: 11px; color: #6b7180; }
  #reset { padding: 10px 16px; border: 1px solid #3a4054; border-radius: 8px; background: transparent; color: #9aa0b0; margin-top: 4px; }
</style>
</head>
<body>
  <button id="start">タップして計測開始</button>
  <div id="version">v0.5</div>

  <div id="game" class="hidden">
    <div class="penalty"><span id="pen">0</span><small>失点</small></div>
    <div id="bar"><div id="barfill"></div></div>
    <div class="row">いまの動きの強さ: <b id="motion">0.0</b></div>

    <div class="panel">
      <div class="ctl">
        <div class="ctl-head"><span>しきい値</span><b id="thVal">1.0</b></div>
        <input id="th" type="range" min="0.2" max="12" step="0.1" value="1">
        <div class="hint">小さいほど敏感（わずかな動きで失点）</div>
      </div>
      <div class="ctl">
        <div class="ctl-head"><span>ベースライン追従度</span><b id="alphaVal">0.90</b></div>
        <input id="alpha" type="range" min="0.5" max="0.99" step="0.01" value="0.9">
        <div class="hint">大きいほど重力除去がゆっくり（=ゆっくりな動きも拾う）</div>
      </div>
      <div class="ctl">
        <div class="ctl-head"><span>連続失点の間隔(ms)</span><b id="cdVal">200</b></div>
        <input id="cd" type="range" min="50" max="1000" step="50" value="200">
        <div class="hint">大きいほど失点が入りにくい（連打防止）</div>
      </div>
      <div class="ctl">
        <div class="ctl-head"><span>メーター追従速度</span><b id="smVal">0.20</b></div>
        <input id="sm" type="range" min="0.05" max="1" step="0.05" value="0.2">
        <div class="hint">大きいほど反応が速く、小さいほど滑らか</div>
      </div>
      <div class="ctl">
        <div class="ctl-head"><span>メーター湾曲度</span><b id="curveVal">9</b></div>
        <input id="curve" type="range" min="1" max="20" step="1" value="9">
        <div class="hint">大きいほどしきい値付近で伸びが鈍り“ギリギリ感”が出る</div>
      </div>
      <button id="reset">失点リセット</button>
    </div>

    <div class="row" id="raw">x: 0  y: 0  z: 0</div>
  </div>

<script>
  let baseline = 9.8;
  let ALPHA = 0.9, THRESHOLD = 1.0, COOLDOWN_MS = 200, SMOOTHING = 0.2, CURVE = 9;
  let penalty = 0;
  let latestMotion = 0, lastRaw = {x:0,y:0,z:0}, lastHitTime = 0;
  let displayMotion = 0;
  const $ = id => document.getElementById(id);

  // 対数メーター: しきい値に近づくほど伸びが鈍る
  function meterPct(ratio) {
    const r = Math.max(0, Math.min(1, ratio));
    return 100 * Math.log(1 + CURVE * r) / Math.log(1 + CURVE);
  }

  function handleMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a || a.x === null) return;
    const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
    baseline = ALPHA * baseline + (1 - ALPHA) * mag;
    const motion = Math.abs(mag - baseline);
    latestMotion = motion; lastRaw = a;
    const now = performance.now();
    if (motion > THRESHOLD && now - lastHitTime > COOLDOWN_MS) {
      penalty += 1; lastHitTime = now; $('pen').textContent = penalty;
    }
  }

  function render() {
    displayMotion += (latestMotion - displayMotion) * SMOOTHING;
    $('barfill').style.width = meterPct(displayMotion / THRESHOLD).toFixed(1) + '%';
    $('motion').textContent = displayMotion.toFixed(1);
    const over = latestMotion > THRESHOLD;
    $('barfill').style.background = over ? '#ff5c5c' : '#4f7cff';
    document.body.classList.toggle('over', over);
    $('raw').textContent = `x: ${lastRaw.x.toFixed(1)}  y: ${lastRaw.y.toFixed(1)}  z: ${lastRaw.z.toFixed(1)}`;
    requestAnimationFrame(render);
  }

  async function start() {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') { alert('センサーの利用が許可されませんでした'); return; }
      } catch (err) { alert('許可の取得に失敗: ' + err); return; }
    }
    window.addEventListener('devicemotion', handleMotion);
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (e) {}
    $('start').classList.add('hidden');
    $('version').classList.add('hidden');
    $('game').classList.remove('hidden');
    requestAnimationFrame(render);
  }

  $('start').addEventListener('click', start);
  $('th').addEventListener('input', e => { THRESHOLD = parseFloat(e.target.value); $('thVal').textContent = THRESHOLD.toFixed(1); });
  $('alpha').addEventListener('input', e => { ALPHA = parseFloat(e.target.value); $('alphaVal').textContent = ALPHA.toFixed(2); });
  $('cd').addEventListener('input', e => { COOLDOWN_MS = parseInt(e.target.value,10); $('cdVal').textContent = COOLDOWN_MS; });
  $('sm').addEventListener('input', e => { SMOOTHING = parseFloat(e.target.value); $('smVal').textContent = SMOOTHING.toFixed(2); });
  $('curve').addEventListener('input', e => { CURVE = parseInt(e.target.value,10); $('curveVal').textContent = CURVE; });
  $('reset').addEventListener('click', () => { penalty = 0; $('pen').textContent = 0; });
</script>
</body>
</html>
