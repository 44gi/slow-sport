<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>動き検知テスト</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, sans-serif;
    background: #0f1117; color: #e8eaf0;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; padding: 20px;
    transition: background 0.15s;
  }
  body.over { background: #5c1a1a; }
  #start {
    font-size: 22px; padding: 18px 36px; border: none; border-radius: 14px;
    background: #4f7cff; color: #fff; font-weight: 700;
  }
  .hidden { display: none !important; }
  .penalty { font-size: 88px; font-weight: 800; line-height: 1; }
  .penalty small { font-size: 18px; font-weight: 500; color: #9aa0b0; display: block; margin-top: 6px; }
  .row { font-size: 15px; color: #9aa0b0; font-variant-numeric: tabular-nums; }
  .row b { color: #e8eaf0; font-size: 19px; }
  #bar { width: 80%; height: 22px; background: #232838; border-radius: 11px; overflow: hidden; }
  #barfill { height: 100%; width: 0%; background: #4f7cff; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .controls label { font-size: 14px; color: #9aa0b0; }
  input[type=range] { width: 180px; }
  #reset { padding: 8px 16px; border: 1px solid #3a4054; border-radius: 8px; background: transparent; color: #9aa0b0; }
</style>
</head>
<body>
  <button id="start">タップして計測開始</button>

  <div id="game" class="hidden">
    <div class="penalty"><span id="pen">0</span><small>失点</small></div>
    <div id="bar"><div id="barfill"></div></div>
    <div class="row">いまの動きの強さ: <b id="motion">0.0</b></div>
    <div class="row">しきい値: <b id="thVal">2.0</b></div>
    <div class="controls">
      <label>しきい値 <input id="th" type="range" min="0.2" max="12" step="0.1" value="2"></label>
      <button id="reset">失点リセット</button>
    </div>
    <div class="row" id="raw">x: 0  y: 0  z: 0</div>
  </div>

<script>
  let baseline = 9.8;
  const ALPHA = 0.9;
  let THRESHOLD = 2.0;
  let penalty = 0;

  // --- センサー側で更新する「最新の状態」 ---
  let latestMotion = 0;     // 直近の生の動きの強さ
  let lastRaw = {x:0, y:0, z:0};
  let lastHitTime = 0;      // 直近に失点したミリ秒（クールダウン用）
  const COOLDOWN_MS = 200;  // 連続失点を防ぐ最小間隔

  // --- 描画側で滑らかに動かす「表示用の状態」 ---
  let displayMotion = 0;    // latestMotion へ補間で追従する値

  const $ = id => document.getElementById(id);

  // センサー：検知だけを担当（描画はしない）
  function handleMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a || a.x === null) return;
    const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
    baseline = ALPHA * baseline + (1 - ALPHA) * mag;
    const motion = Math.abs(mag - baseline);
    latestMotion = motion;
    lastRaw = a;

    const now = performance.now();
    if (motion > THRESHOLD && now - lastHitTime > COOLDOWN_MS) {
      penalty += 1;
      lastHitTime = now;
      $('pen').textContent = penalty;
    }
  }

  // 描画：requestAnimationFrame で毎フレーム滑らかに動かす
  function render() {
    // displayMotion を latestMotion へ滑らかに寄せる（0.25 = 追従の速さ）
    displayMotion += (latestMotion - displayMotion) * 0.25;

    const pct = Math.min(100, (displayMotion / THRESHOLD) * 100);
    $('barfill').style.width = pct.toFixed(1) + '%';
    $('motion').textContent = displayMotion.toFixed(1);

    const over = latestMotion > THRESHOLD;
    $('barfill').style.background = over ? '#ff5c5c' : '#4f7cff';
    document.body.classList.toggle('over', over);

    $('raw').textContent =
      `x: ${lastRaw.x.toFixed(1)}  y: ${lastRaw.y.toFixed(1)}  z: ${lastRaw.z.toFixed(1)}`;

    requestAnimationFrame(render);
  }

  async function start() {
    // iOSはユーザー操作内での許可取得が必須
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') { alert('センサーの利用が許可されませんでした'); return; }
      } catch (err) { alert('許可の取得に失敗: ' + err); return; }
    }
    window.addEventListener('devicemotion', handleMotion);

    // 画面スリープ防止（iOS 16.4+）
    try {
      if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
    } catch (e) {}

    $('start').classList.add('hidden');
    $('game').classList.remove('hidden');
    requestAnimationFrame(render);   // 描画ループ開始
  }

  $('start').addEventListener('click', start);
  $('th').addEventListener('input', e => {
    THRESHOLD = parseFloat(e.target.value);
    $('thVal').textContent = THRESHOLD.toFixed(1);
  });
  $('reset').addEventListener('click', () => { penalty = 0; $('pen').textContent = 0; });
</script>
</body>
</html>
