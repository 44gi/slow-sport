<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>プレイヤー</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,sans-serif; background:#0f1117; color:#e8eaf0;
    height:100vh; height:100dvh; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:20px; transition:background .18s; }
  #start { font-size:22px; padding:18px 36px; border:none; border-radius:14px; background:#4f7cff; color:#fff; font-weight:700; }
  #version { font-size:13px; color:#6b7180; }
  .hidden { display:none !important; }
  #status { font-size:13px; color:#cfd3de; background:rgba(0,0,0,.25); padding:6px 12px; border-radius:999px; }
  #endlabel { position:fixed; top:0; left:0; right:0; text-align:center; padding-top:max(14px,env(safe-area-inset-top));
    font-size:clamp(28px,6vh,56px); font-weight:900; color:#ff5c5c; letter-spacing:4px; pointer-events:none; z-index:5; }
  #timeLabel { position:fixed; top:0; left:0; right:0; text-align:center; padding-top:max(12px,env(safe-area-inset-top));
    font-size:clamp(20px,4vh,34px); font-weight:800; color:#cfd3de; font-variant-numeric:tabular-nums; pointer-events:none; z-index:4; }
  #timeLabel.warn { color:#ffb84d; }
  #practiceBanner { position:fixed; top:0; left:0; right:0; text-align:center; padding:max(10px,env(safe-area-inset-top)) 12px 10px;
    background:rgba(255,184,77,.14); color:#ffb84d; font-size:clamp(13px,2.4vh,17px); font-weight:700; z-index:5; }
  #practiceReset { margin-top:6px; padding:8px 18px; border:1px solid #3a4054; border-radius:10px; background:transparent; color:#9aa0b0; font-size:14px; }
  .stage { width:min(86vw,460px); display:flex; flex-direction:column; align-items:center; gap:clamp(20px,6vh,64px); }
  #slotbadge { width:100%; text-align:center; padding:12px 0; border-radius:14px;
    background:rgba(0,0,0,.28); font-size:clamp(18px,3.6vh,26px); font-weight:700; }
  #slotbadge .hint { display:block; font-size:11px; font-weight:400; color:#aeb4c2; margin-top:2px; }
  .score { width:100%; text-align:center; white-space:nowrap; font-weight:900; line-height:.9; font-variant-numeric:tabular-nums; }
  .score.count { color:#4f9bff; }
  #bar { width:100%; height:46px; background:rgba(0,0,0,.3); border-radius:23px; overflow:hidden; }
  #barfill { height:100%; width:0%; background:#4f7cff; border-radius:23px; }
</style>
</head>
<body>
  <button id="start">タップして計測開始</button>
  <div id="version">v1.4</div>
  <div id="status" class="hidden"></div>
  <div id="endlabel" class="hidden">終了</div>
  <div id="timeLabel" class="hidden"></div>
  <div id="practiceBanner" class="hidden"></div>

  <div id="game" class="hidden">
    <div class="stage">
      <div id="slotbadge" class="hidden">プレイヤー <span id="slotno">?</span><span class="hint">タップで名前を変更</span></div>
      <div class="score" id="pen">0</div>
      <div id="bar"><div id="barfill"></div></div>
      <button id="practiceReset" class="hidden">失点リセット</button>
    </div>
  </div>

<script>
  const ALPHA=0.9, THRESHOLD=1.0, COOLDOWN_MS=200, SMOOTHING=0.2, CURVE=9, DEADZONE=0.2;
  let baseline=9.8, penalty=0, latestMotion=0, lastHitTime=0, displayMotion=0;
  let phase='idle', countdownN=0;
  const $ = id => document.getElementById(id);
  const room = new URLSearchParams(location.search).get('room');
  let conn=null, slot=null, hue=null, playerName='', practice=false;

  const HUES=[210,145,30,280,340,52,180,255];
  const bg     = h => `hsl(${h},55%,16%)`;
  const bgOver = h => `hsl(${h},66%,34%)`;
  const meter  = h => `hsl(${h},82%,60%)`;

  const isActive = () => practice || (phase==='idle' || phase==='running');
  function meterPct(ratio){ const r=Math.max(0,Math.min(1,ratio)); return 100*Math.log(1+CURVE*r)/Math.log(1+CURVE); }

  function fitScore(){
    const el=$('pen'); let size=Math.min(240, el.clientWidth);
    el.style.fontSize=size+'px';
    let guard=0;
    while(el.scrollWidth > el.clientWidth && size>44 && guard<80){ size-=6; el.style.fontSize=size+'px'; guard++; }
  }
  function refreshScoreText(){
    if(phase==='countdown') $('pen').textContent = String(countdownN);
    else $('pen').textContent = penalty===0 ? '0' : '−'+penalty;
    fitScore();
  }

  // 失点ビープ
  let actx=null;
  function ensureCtx(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }
  function beep(){
    if(!actx) return;
    const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
    o.type='square'; o.frequency.value=880;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3,t+0.005); g.gain.linearRampToValueAtTime(0,t+0.09);
    o.connect(g).connect(actx.destination); o.start(t); o.stop(t+0.1);
  }

  function handleMotion(e){
    const a=e.accelerationIncludingGravity; if(!a||a.x===null) return;
    const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
    baseline=ALPHA*baseline+(1-ALPHA)*mag;
    let motion=Math.abs(mag-baseline);
    if(motion < DEADZONE) motion = 0;     // 机置きのプルプルを無視
    latestMotion=motion;
    const now=performance.now();
    if(isActive() && motion>THRESHOLD && now-lastHitTime>COOLDOWN_MS){
      penalty++; lastHitTime=now; refreshScoreText(); beep();
    }
  }

  function render(){
    const target = isActive() ? latestMotion : 0;       // 非アクティブ時はメーター0
    displayMotion += (target - displayMotion)*SMOOTHING;
    $('barfill').style.width = meterPct(displayMotion/THRESHOLD).toFixed(1)+'%';
    const over = isActive() && latestMotion>THRESHOLD;
    if(hue===null){
      document.body.style.background = over ? '#5c1a1a' : '#0f1117';
      $('barfill').style.background = over ? '#ff5c5c' : '#4f7cff';
    } else {
      document.body.style.background = over ? bgOver(hue) : bg(hue);
      $('barfill').style.background = meter(hue);
    }
    requestAnimationFrame(render);
  }

  function setStatus(t){ $('status').textContent=t; $('status').classList.remove('hidden'); }
  function gotoPractice(msg){
    practice = true;                       // 進行に縛られず常時計測
    $('practiceBanner').textContent = msg || '練習モード';
    $('practiceBanner').classList.remove('hidden');
    $('practiceReset').classList.remove('hidden');
    $('slotbadge').classList.add('hidden');
    $('status').classList.add('hidden');
    refreshScoreText();
  }
  $('practiceReset').addEventListener('click', ()=>{ penalty=0; refreshScoreText(); });
  function defaultName(){ return 'プレイヤー ' + (slot!=null && slot>=0 ? slot+1 : '?'); }
  function updateBadge(){ $('slotbadge').innerHTML = (playerName||defaultName()) + '<span class="hint">タップで名前を変更</span>'; }

  $('slotbadge').addEventListener('click', ()=>{
    const v = prompt('プレイヤー名を入力', playerName || '');
    if(v===null) return;
    playerName = v.trim(); updateBadge();
    if(conn && conn.open) conn.send({type:'name', name: playerName || defaultName()});
  });

  let wl=null;
  async function lock(){ try{ if('wakeLock' in navigator) wl=await navigator.wakeLock.request('screen'); }catch(e){} }
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') lock(); });
  window.addEventListener('resize', ()=>{ if(!$('game').classList.contains('hidden')) fitScore(); });

  function applyPhase(p, n){
    phase = p; countdownN = n||0;
    if(phase==='countdown') penalty=0;     // カウントダウン中は0表示
    $('pen').classList.toggle('count', phase==='countdown');
    $('endlabel').classList.toggle('hidden', phase!=='ended');
    if(phase!=='running') $('timeLabel').classList.add('hidden');
    refreshScoreText();
  }

  function connect(){
    if(!room){ gotoPractice('練習モード（スコアボード未接続）'); return; }   // 部屋番号なしの直接アクセス
    setStatus('スコアボードに接続中…');
    const peer=new Peer();
    peer.on('open', ()=>{
      conn=peer.connect('ss-'+room,{reliable:false});
      conn.on('open', ()=>{ setStatus('接続済み'); conn.send({type:'join'}); if(playerName) conn.send({type:'name',name:playerName}); });
      conn.on('data', d=>{
        if(!d) return;
        if(d.type==='slot'){
          slot=d.slot;
          if(slot<0){ gotoPractice('満員で本戦には入れません（練習モード）'); return; }
          hue=HUES[slot%HUES.length]; updateBadge(); $('slotbadge').classList.remove('hidden');
        }
        else if(d.type==='reset'){ penalty=0; refreshScoreText(); }
        else if(d.type==='phase'){ applyPhase(d.phase, d.n); }
        else if(d.type==='time'){
          const m=Math.floor(d.remain/60), ss=String(d.remain%60).padStart(2,'0');
          const el=$('timeLabel');
          el.textContent='残り '+m+':'+ss;
          el.classList.toggle('warn', d.remain<=10);
          if(phase==='running') el.classList.remove('hidden');
        }
      });
      conn.on('close', ()=> setStatus('切断されました。再読み込みしてください'));
    });
    peer.on('error', e=> setStatus('接続エラー: '+e.type+'（部屋コードを確認）'));
    setInterval(()=>{
      if(conn&&conn.open){
        const act=isActive();
        conn.send({type:'state', penalty, ratio: act? latestMotion/THRESHOLD : 0, over: act && latestMotion>THRESHOLD});
      }
    }, 100);
  }

  async function start(){
    ensureCtx();
    if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
      try{ const r=await DeviceMotionEvent.requestPermission(); if(r!=='granted'){ alert('センサーが許可されませんでした'); return; } }
      catch(err){ alert('許可の取得に失敗: '+err); return; }
    }
    window.addEventListener('devicemotion', handleMotion);
    lock();
    $('start').classList.add('hidden'); $('version').classList.add('hidden');
    $('game').classList.remove('hidden');
    refreshScoreText();
    requestAnimationFrame(render);
    connect();
  }
  $('start').addEventListener('click', start);
</script>
</body>
</html>
